services:
  web:
    build: .
    command: gunicorn starter.wsgi:application --bind 0.0.0.0:8000 --workers 3
    # Loads variables inside the web container. Use docker compose
    # --env-file .env so Compose also uses .env for ${...} interpolation.
    env_file:
      - .env
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:?DJANGO_SECRET_KEY is required in .env}
      DJANGO_DEBUG: "False"
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:?DJANGO_ALLOWED_HOSTS is required in .env}
      SQLITE_NAME: ${SQLITE_NAME:-db.sqlite3}
      POSTGRES_DB: ${POSTGRES_DB:-django_template}
      POSTGRES_USER: ${POSTGRES_USER:-django}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-django}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-django_template}
      MYSQL_USER: ${MYSQL_USER:-django}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-django}
      MYSQL_HOST: ${MYSQL_HOST:-mysql}
      MYSQL_PORT: ${MYSQL_PORT:-3306}
      MONGODB_DATABASE: ${MONGODB_DATABASE:-django_template}
      MONGODB_USER: ${MONGODB_USER:-mongo}
      MONGODB_PASSWORD: ${MONGODB_PASSWORD:-mongo}
      MONGODB_HOST: ${MONGODB_HOST:-mongodb}
      MONGODB_PORT: ${MONGODB_PORT:-27017}
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongo:mongo@mongodb:27017/django_template?authSource=admin}
    ports:
      - "8000:8000"
    # Uncomment the database service you want to use, then uncomment its
    # matching settings block in starter/settings.py.
    # depends_on:
    #   mysql:
    #     condition: service_healthy
    #   postgres:
    #     condition: service_healthy
    #   mongodb:
    #     condition: service_started
    restart: unless-stopped

