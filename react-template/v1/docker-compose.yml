services:
  web:
    build:
      context: .
      target: development
    command: npm run dev -- --host 0.0.0.0
    env_file:
      - .env
    environment:
      VITE_APP_NAME: ${VITE_APP_NAME:?VITE_APP_NAME is required in .env}
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:?VITE_API_BASE_URL is required in .env}
      VITE_ENABLE_ANALYTICS: ${VITE_ENABLE_ANALYTICS:-false}
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - node_modules:/app/node_modules

volumes:
  node_modules:
